<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A tiny 2D world: walk around, get close to people, and chat." />
    <title>pixelhub</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%202%202'%3E%3Crect%20width='1'%20height='1'%20fill='%23e8a04c'/%3E%3Crect%20x='1'%20width='1'%20height='1'%20fill='%234f7d74'/%3E%3Crect%20y='1'%20width='1'%20height='1'%20fill='%23a8545c'/%3E%3Crect%20x='1'%20y='1'%20width='1'%20height='1'%20fill='%236d5d7d'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="game"></div>
      <aside id="chat" class="chat hidden">
        <div class="chat__brand">pixelhub</div>
        <div class="chat__nearby">
          <h2>In range</h2>
          <ul id="nearby-list"></ul>
        </div>
        <ul id="chat-messages" class="chat__messages"></ul>
        <form id="chat-form" class="chat__form" autocomplete="off">
          <input
            id="chat-input"
            type="text"
            maxlength="500"
            placeholder="Say something to people nearby..."
          />
          <button type="submit">Send</button>
        </form>
      </aside>
    </div>
    <div id="join" class="join">
      <form id="join-form" class="join__card">
        <div class="join__avatar" aria-hidden="true"></div>
        <h1>pixel<span>hub</span></h1>
        <p>Walk around, get close to people, and chat.</p>
        <input
          id="join-name"
          type="text"
          maxlength="20"
          placeholder="Your display name"
          autofocus
        />
        <button type="submit">Enter the world</button>
        <p class="join__hint">Move with <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or the arrow keys</p>
        <p id="join-error" class="join__error" role="alert"></p>
      </form>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
