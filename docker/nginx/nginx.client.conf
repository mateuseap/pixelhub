# The `server` upstream resolves both in docker compose (service name) and in
# Kubernetes (Service named `server`), same trick as chesskernel.
upstream colyseus {
    server server:2567;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress the bundle: the Phaser chunk is ~1 MB uncompressed, so serving
    # it without gzip dominated first-load time on slow connections.
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Colyseus matchmaking (HTTP) + room connections (WebSocket), same-origin.
    # Trailing slash on proxy_pass strips the /colyseus prefix.
    location /colyseus/ {
        proxy_pass http://colyseus/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
